<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Аудио Переводчик</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 20px; padding: 20px; }
        h1 { text-align: center; color: #667eea; margin-bottom: 10px; }
        .api-status { text-align: center; padding: 8px; border-radius: 8px; margin-bottom: 15px; font-size: 12px; }
        .api-status.ok { background: #e8f5e9; color: #2e7d32; }
        .api-status.error { background: #ffebee; color: #c62828; }
        .dir-btn { width: 48%; padding: 12px; margin: 1%; border: 2px solid #667eea; background: white; color: #667eea; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .dir-btn.active { background: #667eea; color: white; }
        .mic-btn { width: 90px; height: 90px; border-radius: 50%; border: none; background: #4CAF50; color: white; font-size: 36px; display: block; margin: 20px auto; cursor: pointer; }
        .mic-btn.listening { background: #f44336; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .text-box { background: #f5f5f5; padding: 15px; border-radius: 10px; margin: 10px 0; min-height: 60px; }
        .text-box h3 { font-size: 12px; color: #666; margin-bottom: 5px; }
        .error { background: #ffebee; color: #c62828; padding: 10px; border-radius: 8px; margin: 10px 0; display: none; }
        .loading { text-align: center; color: #667eea; padding: 10px; display: none; }
        .lang-select { display: flex; gap: 10px; margin: 10px 0; }
        .lang-btn { flex: 1; padding: 10px; border: 2px solid #667eea; background: white; color: #667eea; border-radius: 8px; cursor: pointer; }
        .lang-btn.active { background: #667eea; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Аудио Переводчик</h1>
        <div class="api-status" id="apiStatus">🔌 Проверка...</div>
        
        <button class="dir-btn active" id="listenBtn" onclick="setDir('listen')">👂 Слушать (Китайский → Русский)</button>
        <button class="dir-btn" id="speakBtn" onclick="setDir('speak')">🗣️ Говорить (Русский → Китайский)</button>
        
        <div class="lang-select">
            <button class="lang-btn active" onclick="setLang('zh-CN')">🇨🇳 Китайский</button>
            <button class="lang-btn" onclick="setLang('en-US')">🇬🇧 Английский</button>
        </div>
        
        <div class="text-box">
            <h3>Распознано:</h3>
            <p id="recognized">Нажмите микрофон...</p>
        </div>
        
        <div class="text-box" style="background:#e8f5e9;">
            <h3>Перевод:</h3>
            <p id="translated">...</p>
        </div>
        
        <div class="error" id="error"></div>
        <div class="loading" id="loading">⏳ Перевожу...</div>
        
        <button class="mic-btn" id="micBtn" onclick="toggle()">🎤</button>
    </div>

    <script>
        const API_KEY = 'sk-e8s2eOPoLT-yIP4qvbspHA';
        const API_URL = 'https://llm.nitec.kz/v1';
        let dir = 'listen';
        let lang = 'zh-CN';
        let recognition = null;
        let isRecording = false;
        
        // ===== ПРОВЕРКА ПОДКЛЮЧЕНИЯ =====
        window.addEventListener('load', async function() {
            try {
                const response = await fetch(API_URL + '/models', {
                    headers: { 'Authorization': 'Bearer ' + API_KEY }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const models = data.data || [];
                    if (models.length > 0) {
                        document.getElementById('apiStatus').className = 'api-status ok';
                        document.getElementById('apiStatus').textContent = '✅ Подключено • Модель: ' + models[0].id;
                    } else {
                        throw new Error('Нет доступных моделей');
                    }
                } else {
                    throw new Error('HTTP ' + response.status);
                }
            } catch (e) {
                document.getElementById('apiStatus').className = 'api-status error';
                document.getElementById('apiStatus').textContent = '❌ Ошибка: ' + e.message;
            }
        });
        
        function setDir(d) {
            dir = d;
            document.getElementById('listenBtn').className = 'dir-btn' + (d === 'listen' ? ' active' : '');
            document.getElementById('speakBtn').className = 'dir-btn' + (d === 'speak' ? ' active' : '');
        }
        
        function setLang(l) {
            lang = l;
            const btns = document.querySelectorAll('.lang-btn');
            btns[0].className = 'lang-btn' + (l === 'zh-CN' ? ' active' : '');
            btns[1].className = 'lang-btn' + (l === 'en-US' ? ' active' : '');
        }
        
        function toggle() {
            if (isRecording) {
                stop();
            } else {
                start();
            }
        }
        
        function start() {
            if (!('webkitSpeechRecognition' in window)) {
                showError('Используйте Safari');
                return;
            }
            
            recognition = new webkitSpeechRecognition();
            recognition.lang = dir === 'listen' ? lang : 'ru-RU';
            recognition.interimResults = false;
            recognition.continuous = false;
            
            recognition.onresult = function(e) {
                const text = e.results[0][0].transcript;
                document.getElementById('recognized').textContent = text;
                translate(text);
            };
            
            recognition.onerror = function(e) {
                showError('Ошибка: ' + e.error);
            };
            
            recognition.onend = function() {
                isRecording = false;
                document.getElementById('micBtn').className = 'mic-btn';
            };
            
            try {
                recognition.start();
                isRecording = true;
                document.getElementById('micBtn').className = 'mic-btn listening';
                document.getElementById('recognized').textContent = 'Слушаю...';
            } catch (e) {
                showError('Ошибка запуска: ' + e.message);
            }
        }
        
        function stop() {
            if (recognition) {
                recognition.stop();
            }
            isRecording = false;
            document.getElementById('micBtn').className = 'mic-btn';
        }
        
        async function translate(text) {
            document.getElementById('loading').style.display = 'block';
            hideError();
            
            try {
                let prompt, targetLang;
                
                if (dir === 'listen') {
                    const sourceLang = lang === 'zh-CN' ? 'Chinese' : 'English';
                    prompt = 'Translate ' + sourceLang + ' to Russian. Return only translation.';
                    targetLang = 'ru-RU';
                } else {
                    const targetLangName = lang === 'zh-CN' ? 'Chinese' : 'English';
                    prompt = 'Translate Russian to ' + targetLangName + '. Return only translation.';
                    targetLang = lang;
                }
                
                // Используем alemgpt-intent - это основная модель из документации
                const response = await fetch(API_URL + '/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + API_KEY
                    },
                    body: JSON.stringify({
                        model: 'alemgpt-intent',  // Основная модель из документации
                        messages: [
                            { role: 'system', content: prompt },
                            { role: 'user', content: text }
                        ],
                        temperature: 0.3,
                        max_tokens: 500
                    })
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error('HTTP ' + response.status + ': ' + errorText);
                }
                
                const data = await response.json();
                const translation = data.choices[0].message.content.trim();
                
                document.getElementById('translated').textContent = translation;
                
                // Озвучка
                const utterance = new SpeechSynthesisUtterance(translation);
                utterance.lang = targetLang;
                utterance.rate = 0.9;
                speechSynthesis.speak(utterance);
                
            } catch (error) {
                showError('Ошибка перевода: ' + error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        function showError(msg) {
            const err = document.getElementById('error');
            err.textContent = msg;
            err.style.display = 'block';
            setTimeout(() => { err.style.display = 'none'; }, 8000);
        }
        
        function hideError() {
            document.getElementById('error').style.display = 'none';
        }
    </script>
</body>
</html>
