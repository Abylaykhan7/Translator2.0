<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Аудио Переводчик PRO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 20px; padding: 20px; }
        h1 { text-align: center; color: #667eea; margin-bottom: 10px; }
        .api-status { text-align: center; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; }
        .api-status.ok { background: #e8f5e9; color: #2e7d32; }
        .api-status.error { background: #ffebee; color: #c62828; }
        .dir-btn { width: 48%; padding: 12px; margin: 1%; border: 2px solid #667eea; background: white; color: #667eea; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .dir-btn.active { background: #667eea; color: white; }
        .model-select { margin: 15px 0; }
        .model-label { font-size: 12px; color: #666; margin-bottom: 8px; font-weight: bold; }
        .model-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
        .model-btn { flex: 1; min-width: 100px; padding: 10px; border: 2px solid #667eea; background: white; color: #667eea; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .model-btn.active { background: #667eea; color: white; }
        .mic-btn { width: 90px; height: 90px; border-radius: 50%; border: none; background: #4CAF50; color: white; font-size: 36px; display: block; margin: 20px auto; cursor: pointer; }
        .mic-btn.listening { background: #f44336; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .text-box { background: #f5f5f5; padding: 15px; border-radius: 10px; margin: 10px 0; min-height: 60px; }
        .text-box h3 { font-size: 12px; color: #666; margin-bottom: 5px; }
        .error { background: #ffebee; color: #c62828; padding: 12px; border-radius: 8px; margin: 10px 0; display: none; }
        .loading { text-align: center; color: #667eea; padding: 10px; display: none; font-weight: bold; }
        .lang-select { display: flex; gap: 10px; margin: 10px 0; }
        .lang-btn { flex: 1; padding: 10px; border: 2px solid #667eea; background: white; color: #667eea; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .lang-btn.active { background: #667eea; color: white; }
        .hint { background: #fff3e0; border-left: 4px solid #ff9800; padding: 10px; border-radius: 8px; margin: 10px 0; font-size: 13px; color: #e65100; }
        .voice-btn { width: 100%; padding: 12px; border: 2px solid #667eea; background: white; color: #667eea; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .voice-btn:active { background: #667eea; color: white; }
        .current-model { text-align: center; padding: 8px; background: #e3f2fd; border-radius: 8px; margin-bottom: 10px; font-size: 12px; color: #1565c0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Аудио Переводчик</h1>
        <div class="api-status" id="apiStatus">🔌 Подключение...</div>
        
        <div class="current-model" id="currentModel">Модель: Kimi K2</div>
        
        <div class="dir-btn active" id="listenBtn" onclick="setDir('listen')">👂 Слушать (Их → Русский)</div>
        <div class="dir-btn" id="speakBtn" onclick="setDir('speak')" style="margin-top: 5px;">🗣️ Говорить (Русский → Их)</div>
        
        <div class="model-select">
            <div class="model-label">Выберите модель:</div>
            <div class="model-buttons">
                <button class="model-btn active" onclick="setModel('moonshotai/Kimi-K2-Thinking', this)">Kimi K2</button>
                <button class="model-btn" onclick="setModel('openai/gpt-oss-120b', this)">GPT-OSS-120B</button>
                <button class="model-btn" onclick="setModel('deepseek-ai/DeepSeek-V4-Pro', this)">DeepSeek V4</button>
                <button class="model-btn" onclick="setModel('alemgpt-intent', this)">AlemGPT</button>
            </div>
        </div>
        
        <div class="lang-select">
            <button class="lang-btn active" onclick="setLang('zh-CN')">🇨🇳 Китайский</button>
            <button class="lang-btn" onclick="setLang('en-US')">🇬🇧 Английский</button>
        </div>
        
        <div class="hint" id="hint">💡 Они говорят на китайском → Вы слышите русский</div>
        
        <div class="text-box">
            <h3>Распознано:</h3>
            <p id="recognized">Нажмите микрофон...</p>
        </div>
        
        <div class="text-box" style="background:#e8f5e9;">
            <h3>Перевод:</h3>
            <p id="translated">...</p>
        </div>
        
        <button class="voice-btn" onclick="speakTranslation()">🔊 Озвучить перевод</button>
        
        <div class="error" id="error"></div>
        <div class="loading" id="loading">⏳ Перевожу...</div>
        
        <button class="mic-btn" id="micBtn" onclick="toggle()">🎤</button>
    </div>

    <script>
        const API_KEY = 'sk-e8s2eOPoLT-yIP4qvbspHA';
        const API_BASE_URL = 'https://llm.nitec.kz/v1';
        
        let dir = 'listen';
        let lang = 'zh-CN';
        let currentModel = 'moonshotai/Kimi-K2-Thinking';
        let recognition = null;
        let isRecording = false;
        let lastTranslation = '';
        let lastTranslationLang = 'ru-RU';
        
        // ===== ПРОВЕРКА API ПРИ ЗАГРУЗКЕ =====
        window.addEventListener('load', async function() {
            await checkApiConnection();
        });
        
        async function checkApiConnection() {
            const statusEl = document.getElementById('apiStatus');
            try {
                const response = await fetch(API_BASE_URL + '/models', {
                    headers: { 'Authorization': 'Bearer ' + API_KEY }
                });
                
                if (response.ok) {
                    statusEl.className = 'api-status ok';
                    statusEl.textContent = '✅ Alem.Cloud подключен';
                } else if (response.status === 401) {
                    statusEl.className = 'api-status error';
                    statusEl.textContent = '❌ Неверный API ключ';
                } else {
                    throw new Error('HTTP ' + response.status);
                }
            } catch (e) {
                statusEl.className = 'api-status error';
                statusEl.textContent = '❌ Ошибка: ' + e.message;
            }
        }
        
        function setModel(modelName, btn) {
            currentModel = modelName;
            
            // Обновляем активную кнопку
            document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Обновляем отображение
            const modelNameDisplay = modelName.split('/')[1] || modelName;
            document.getElementById('currentModel').textContent = 'Модель: ' + modelNameDisplay;
            
            console.log('Model changed to:', currentModel);
        }
        
        function setDir(d) {
            dir = d;
            document.getElementById('listenBtn').className = 'dir-btn' + (d === 'listen' ? ' active' : '');
            document.getElementById('speakBtn').className = 'dir-btn' + (d === 'speak' ? ' active' : '');
            
            const hintEl = document.getElementById('hint');
            if (d === 'listen') {
                hintEl.textContent = '💡 Они говорят на ' + (lang === 'zh-CN' ? 'китайском' : 'английском') + ' → Вы слышите русский';
            } else {
                hintEl.textContent = '💡 Вы говорите по-русски → Они слышат ' + (lang === 'zh-CN' ? 'китайский' : 'английский');
            }
        }
        
        function setLang(l) {
            lang = l;
            const btns = document.querySelectorAll('.lang-btn');
            btns[0].className = 'lang-btn' + (l === 'zh-CN' ? ' active' : '');
            btns[1].className = 'lang-btn' + (l === 'en-US' ? ' active' : '');
            
            const hintEl = document.getElementById('hint');
            if (dir === 'listen') {
                hintEl.textContent = '💡 Они говорят на ' + (l === 'zh-CN' ? 'китайском' : 'английском') + ' → Вы слышите русский';
            } else {
                hintEl.textContent = '💡 Вы говорите по-русски → Они слышат ' + (l === 'zh-CN' ? 'китайский' : 'английский');
            }
        }
        
        function toggle() {
            if (isRecording) {
                stop();
            } else {
                start();
            }
        }
        
        function start() {
            if (!('webkitSpeechRecognition' in window)) {
                showError('❌ Используйте Safari на iPhone');
                return;
            }
            
            recognition = new webkitSpeechRecognition();
            recognition.lang = dir === 'listen' ? lang : 'ru-RU';
            recognition.interimResults = false;
            recognition.continuous = false;
            
            recognition.onresult = function(e) {
                const text = e.results[0][0].transcript;
                document.getElementById('recognized').textContent = text;
                translate(text);
            };
            
            recognition.onerror = function(e) {
                showError('⚠️ Ошибка: ' + e.error);
            };
            
            recognition.onend = function() {
                isRecording = false;
                document.getElementById('micBtn').className = 'mic-btn';
            };
            
            try {
                recognition.start();
                isRecording = true;
                document.getElementById('micBtn').className = 'mic-btn listening';
                document.getElementById('recognized').textContent = 'Слушаю...';
            } catch (e) {
                showError('❌ Ошибка: ' + e.message);
            }
        }
        
        function stop() {
            if (recognition) recognition.stop();
            isRecording = false;
            document.getElementById('micBtn').className = 'mic-btn';
        }
        
        async function translate(text) {
            document.getElementById('loading').style.display = 'block';
            hideError();
            
            try {
                let prompt, targetLang;
                
                if (dir === 'listen') {
                    const sourceLang = lang === 'zh-CN' ? 'Chinese' : 'English';
                    prompt = 'You are a professional translator. Translate the following ' + sourceLang + ' text to natural Russian. Return ONLY the translation, nothing else.';
                    targetLang = 'ru-RU';
                } else {
                    const targetLangName = lang === 'zh-CN' ? 'Chinese' : 'English';
                    prompt = 'You are a professional translator. Translate the following Russian text to natural ' + targetLangName + '. Return ONLY the translation, nothing else.';
                    targetLang = lang;
                }
                
                console.log('🔄 Модель:', currentModel);
                console.log('📝 Текст:', text);
                
                const response = await fetch(API_BASE_URL + '/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + API_KEY
                    },
                    body: JSON.stringify({
                        model: currentModel,
                        messages: [
                            { role: 'system', content: prompt },
                            { role: 'user', content: text }
                        ],
                        temperature: 0.3,
                        max_tokens: 500
                    })
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error('HTTP ' + response.status + ': ' + errorText);
                }
                
                const data = await response.json();
                const translation = data.choices[0].message.content.trim();
                
                document.getElementById('translated').textContent = translation;
                lastTranslation = translation;
                lastTranslationLang = targetLang;
                
                // Автоматическая озвучка
                speakTranslation();
                
            } catch (error) {
                console.error('Error:', error);
                showError('❌ ' + error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        function speakTranslation() {
            if (!lastTranslation || !('speechSynthesis' in window)) {
                showError('⚠️ Нет текста для озвучки');
                return;
            }
            
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(lastTranslation);
            utterance.lang = lastTranslationLang;
            utterance.rate = lastTranslationLang.startsWith('zh') ? 0.8 : 0.9;
            window.speechSynthesis.speak(utterance);
        }
        
        function showError(msg) {
            const err = document.getElementById('error');
            err.textContent = msg;
            err.style.display = 'block';
            setTimeout(() => { err.style.display = 'none'; }, 10000);
        }
        
        function hideError() {
            document.getElementById('error').style.display = 'none';
        }
    </script>
</body>
</html>
