<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Аудио Переводчик PRO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        h1 { text-align: center; color: #667eea; margin-bottom: 10px; font-size: 22px; }
        .subtitle { text-align: center; color: #666; font-size: 12px; margin-bottom: 20px; }
        .api-status { text-align: center; padding: 8px; border-radius: 8px; font-size: 12px; margin-bottom: 15px; }
        .api-status.ok { background: #e8f5e9; color: #2e7d32; }
        .api-status.error { background: #ffebee; color: #c62828; }
        .api-status.loading { background: #fff3e0; color: #e65100; }
        .direction-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .dir-btn { flex: 1; padding: 12px; border: 2px solid #667eea; background: white; color: #667eea; border-radius: 10px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .dir-btn.active { background: #667eea; color: white; }
        .selector-group { margin-bottom: 12px; }
        .selector-label { font-size: 12px; color: #666; margin-bottom: 5px; font-weight: bold; }
        .selector-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .sel-btn { flex: 1; min-width: 80px; padding: 10px; border: 2px solid #667eea; background: white; color: #667eea; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .sel-btn.active { background: #667eea; color: white; }
        .text-box { background: #f5f5f5; border-radius: 10px; padding: 15px; margin-bottom: 12px; min-height: 70px; max-height: 150px; overflow-y: auto; }
        .text-box h3 { font-size: 12px; color: #666; margin-bottom: 8px; }
        .text-box p { font-size: 14px; line-height: 1.5; }
        .translation-box { background: #e8f5e9; }
        .mic-button { width: 90px; height: 90px; border-radius: 50%; border: none; background: #4CAF50; color: white; font-size: 36px; cursor: pointer; display: block; margin: 20px auto; }
        .mic-button.listening { background: #f44336; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .upload-area { border: 2px dashed #667eea; border-radius: 10px; padding: 20px; text-align: center; margin: 15px 0; cursor: pointer; }
        .upload-area:active { background: #f0f0f0; }
        .upload-icon { font-size: 36px; margin-bottom: 8px; }
        .upload-text { color: #666; font-size: 13px; }
        #fileInput { display: none; }
        .status { text-align: center; color: #666; font-size: 13px; margin-top: 10px; }
        .error { background: #ffebee; color: #c62828; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 13px; display: none; }
        .loading { text-align: center; color: #667eea; font-size: 13px; margin-top: 10px; display: none; }
        .duration { text-align: center; font-size: 20px; font-weight: bold; color: #f44336; margin: 10px 0; }
        .hint-box { background: #fff3e0; border-left: 4px solid #ff9800; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 12px; color: #e65100; }
        .mode-tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .mode-tab { flex: 1; padding: 10px; border: 2px solid #667eea; background: white; color: #667eea; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .mode-tab.active { background: #667eea; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .history-section { margin-top: 15px; }
        .history-item { background: #f5f5f5; border-radius: 10px; padding: 12px; margin-bottom: 8px; cursor: pointer; }
        .history-item:active { background: #e0e0e0; }
        .history-item h4 { font-size: 11px; color: #666; margin-bottom: 5px; }
        .history-item p { font-size: 12px; margin-bottom: 4px; }
        .history-item .translation { color: #2e7d32; }
        .clear-btn { background: #f44336; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 13px; margin-top: 10px; width: 100%; }
        .recording-indicator { display: none; text-align: center; padding: 8px; background: #ffebee; border-radius: 8px; margin-bottom: 10px; color: #c62828; font-size: 12px; }
        .recording-indicator.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 Аудио Переводчик PRO</h1>
        <p class="subtitle">Alem.Cloud • Kimi / Qwen / GPT-OSS</p>
        <div class="api-status loading" id="apiStatus">🔌 Проверка подключения...</div>
        <div class="direction-selector">
            <button class="dir-btn active" id="dirListen">👂 Слушать<br><small>Их → Русский</small></button>
            <button class="dir-btn" id="dirSpeak">🗣️ Говорить<br><small>Русский → Их</small></button>
        </div>
        <div class="mode-tabs">
            <button class="mode-tab active" id="modeLive">🎙️ Запись</button>
            <button class="mode-tab" id="modeUpload">📁 Файл</button>
            <button class="mode-tab" id="modeHistory">📜 История</button>
        </div>
        <div class="tab-content active" id="liveMode">
            <div class="hint-box" id="hintBox">💡 Выберите язык</div>
            <div class="selector-group">
                <div class="selector-label">Язык:</div>
                <div class="selector-buttons">
                    <button class="sel-btn active" id="langZh">🇨🇳 Китайский</button>
                    <button class="sel-btn" id="langEn">🇬 Английский</button>
                </div>
            </div>
            <div class="selector-group">
                <div class="selector-label">Модель:</div>
                <div class="selector-buttons">
                    <button class="sel-btn active" id="modelAlem">alemgpt-intent</button>
                    <button class="sel-btn" id="modelKimi">Kimi-K2</button>
                    <button class="sel-btn" id="modelGpt">GPT-OSS-120B</button>
                </div>
            </div>
            <div class="recording-indicator" id="recordingIndicator">🔴 Запись...</div>
            <div class="text-box"><h3 id="sourceLabel">Распознано:</h3><p id="recognizedText">Нажмите микрофон...</p></div>
            <div class="text-box translation-box"><h3 id="targetLabel">Перевод:</h3><p id="translatedText">...</p></div>
            <div class="duration" id="duration">00:00</div>
            <button class="mic-button" id="micButton">🎤</button>
            <div class="status" id="status">Готов</div>
        </div>
        <div class="tab-content" id="uploadMode">
            <div class="selector-group">
                <div class="selector-label">Язык аудио:</div>
                <div class="selector-buttons">
                    <button class="sel-btn active" id="fileLangZh">🇨🇳 Китайский</button>
                    <button class="sel-btn" id="fileLangEn">🇬🇧 Английский</button>
                    <button class="sel-btn" id="fileLangRu">🇷🇺 Русский</button>
                </div>
            </div>
            <div class="selector-group">
                <div class="selector-label">Модель:</div>
                <div class="selector-buttons">
                    <button class="sel-btn active" id="fileModelAlem">alemgpt-intent</button>
                    <button class="sel-btn" id="fileModelKimi">Kimi-K2</button>
                    <button class="sel-btn" id="fileModelGpt">GPT-OSS-120B</button>
                </div>
            </div>
            <div class="upload-area" id="uploadArea"><div class="upload-icon">📁</div><div class="upload-text">Нажмите для загрузки</div></div>
            <input type="file" id="fileInput" accept="audio/*">
            <div class="text-box"><h3>Распознано:</h3><p id="fileRecognizedText">...</p></div>
            <div class="text-box translation-box"><h3>Перевод:</h3><p id="fileTranslatedText">...</p></div>
        </div>
        <div class="tab-content" id="historyMode">
            <div class="history-section" id="historyList"><p style="text-align:center;color:#666;">История пуста</p></div>
            <button class="clear-btn" id="clearHistoryBtn">🗑️ Очистить</button>
        </div>
        <div class="loading" id="loading">
