    <title>Переводчик Kimi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { background: white; border-radius: 20px; padding: 20px; }
        h1 { text-align: center; color: #667eea; margin-bottom: 20px; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #667eea; background: white; color: #667eea; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn.active { background: #667eea; color: white; }
        .mic-btn { width: 100px; height: 100px; border-radius: 50%; border: none; background: #4CAF50; color: white; font-size: 40px; display: block; margin: 20px auto; }
        .mic-btn.listening { background: #f44336; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .text-box { background: #f5f5f5; padding: 15px; border-radius: 10px; margin: 10px 0; min-height: 60px; }
        .text-box h3 { font-size: 12px; color: #666; margin-bottom: 5px; }
        .error { background: #ffebee; color: #c62828; padding: 10px; border-radius: 8px; margin: 10px 0; display: none; }
        .loading { text-align: center; color: #667eea; padding: 10px; display: none; }
    </style>
</head>

        <div class="loading" id="loading">⏳ Перевожу...</div>
        <div class="error" id="error"></div>
        <button class="mic-btn" id="micBtn" onclick="toggleRecording()">🎤</button>
    </div>
